server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: forward all /api/ calls to the backend
    # This eliminates CORS entirely — the browser only ever talks to this domain
    location /api/ {
        include /tmp/auth_token.conf;  # GCP identity token, written by entrypoint.sh
        proxy_pass https://hik-backend-805730087505.us-east4.run.app/api/;
        proxy_http_version 1.1;
        proxy_set_header Host hik-backend-805730087505.us-east4.run.app;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
    }

    # SPA fallback: all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript;
}

